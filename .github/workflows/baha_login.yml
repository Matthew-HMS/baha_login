name: Login BAHA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '20 16 * * *'


jobs:
  run_selenium:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.8

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium


    - name: Run Selenium Script
      run: python baha.py
      env:
        BAHA_ACCOUNT: ${{ secrets.BAHA_ACCOUNT }}
        BAHA_PASSWORD: ${{ secrets.BAHA_PASSWORD }}

    - name: Upload Failure Artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-debug
        path: |
          error.png
          page_source.html
        if-no-files-found: ignore

    - name: Create Dummy Commit
      run: |
        echo "Dummy commit at $(date)" >> dummy_commit.log
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add dummy_commit.log
        git commit -m "Dummy commit from GitHub Actions"
        git push
